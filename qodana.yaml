####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
# This is an Android/Compose Gradle 9.4 / AGP 9.2 build. Qodana 2026.1's
# Android linter contains the matching Android project-model support.
linter: qodana-android
profile:
  name: qodana.recommended
include:
  - name: CheckDependencyLicenses

# JVM/desktop/cli sources are analyzed under the Android linter model and
# produce false-positive NewApi/SDK checks. Keep Android inspections scoped
# to Android modules; CLI is a pure JVM tool.
exclude:
  - name: AndroidLintNewApi
    paths:
      - cli
  - name: AndroidLintInlinedApi
    paths:
      - cli
  - name: AndroidLintObsoleteSdkInt
    paths:
      - cli
  # Dependency-version noise is tracked via Dependabot/Gradle, not Qodana gates.
  - name: AndroidLintNewerVersionAvailable
  - name: AndroidLintGradleDependency
  - name: AndroidLintAndroidGradlePluginVersion
  # Fake* test doubles inherit these open API/repository classes (mockk ctor
  # injection). Qodana analyzes production sources and flags the required
  # `open` modality as redundant; keep inheritance working for fakes.
  - name: RedundantModalityModifier
    paths:
      - core/data/src/main
      - app/src/main/java/com/letta/mobile/runtime/local
  # Duplicate-block notes are tracked via CodeScene / review, not this gate.
  - name: DuplicatedCode
  # Resource keep rules / build-script false positives without a line anchor.
  - name: AndroidLintUnusedResources
    paths:
      - app/build.gradle.kts
  # Manifest meta-data string consumed by Sentry SDK (not Kotlin R.string refs).
  - name: AndroidLintUnusedResources
    paths:
      - app/src/main/res/values/sentry.xml
