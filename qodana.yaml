####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
# This is an Android/Compose Gradle 9.4 / AGP 9.2 build. Qodana 2026.1's
# Android linter contains the matching Android project-model support.
linter: qodana-android
profile:
  name: qodana.recommended
include:
  - name: CheckDependencyLicenses

# JVM/desktop/cli sources are analyzed under the Android linter model and
# produce false-positive NewApi/SDK checks. Keep Android inspections scoped
# to Android modules; CLI is a pure JVM tool.
exclude:
  - name: AndroidLintNewApi
    paths:
      - cli
  - name: AndroidLintInlinedApi
    paths:
      - cli
  - name: AndroidLintObsoleteSdkInt
    paths:
      - cli
  # Dependency-version noise is tracked via Dependabot/Gradle, not Qodana gates.
  - name: AndroidLintNewerVersionAvailable
  - name: AndroidLintGradleDependency
  - name: AndroidLintAndroidGradlePluginVersion
  # Fake* test doubles inherit these open API/repository classes (mockk ctor
  # injection). Qodana analyzes production sources and flags the required
  # `open` modality as redundant; keep inheritance working for fakes.
  - name: RedundantModalityModifier
    paths:
      - core/data/src/main
      - app/src/main/java/com/letta/mobile/runtime/local
  # Duplicate-block notes are tracked via CodeScene / review, not this gate.
  - name: DuplicatedCode
  # Resource keep rules / build-script false positives without a line anchor.
  - name: AndroidLintUnusedResources
    paths:
      - app/build.gradle.kts
  # Manifest meta-data string consumed by Sentry SDK (not Kotlin R.string refs).
  - name: AndroidLintUnusedResources
    paths:
      - app/src/main/res/values/sentry.xml
  # Hilt @Binds/@Provides/@Inject, Room @Dao/@TypeConverter, Compose @Preview,
  # serialization contracts, plugin entry points, native bridges, and endpoint
  # interfaces look "unused" to static analysis but are required by frameworks.
  - name: UnusedSymbol
    paths:
      - app/src/main/java/com/letta/mobile/di # Hilt @Module/@Binds/@Provides wiring
      - app/src/play/java/com/letta/mobile/di # play-flavor Hilt modules (RootShellBridgeModule)
      - app/src/main/java/com/letta/mobile/platform/storage/StorageToolModels.kt # storage tool serialization contract variants
      - app/src/main/java/com/letta/mobile/runtime/actions/MobileActionModels.kt # action/tool model variants kept for serialization exhaustiveness
      - app/src/main/java/com/letta/mobile/runtime/local/LettaCodeNodeBridge.kt # JNI bridge entry points called from native code
      - app/src/main/java/com/letta/mobile/ui/screens/memory/MemoryOverviewScreen.kt # @Preview entry points outside Previews.kt
      - app/src/main/java/com/letta/mobile/ui/screens/runs/RunMonitorScreen.kt # @Preview entry points outside Previews.kt
      - build-logic/src/main/kotlin/com/letta/mobile/architecture # Gradle plugin entry loaded by plugin id
      - core/data/src/main/java/com/letta/mobile/data/api # Retrofit/Ktor endpoint interface methods
      - core/data/src/main/java/com/letta/mobile/data/capability # Hilt @Inject capability constructors
      - core/data/src/main/java/com/letta/mobile/data/health # Hilt @Inject health constructors
      - core/data/src/main/java/com/letta/mobile/data/local # Room @Dao query methods
      - core/data/src/main/java/com/letta/mobile/data/repository # Hilt @Inject repository constructors
      - core/data/src/main/java/com/letta/mobile/data/session # SessionScoped Hilt factory bindings
      - core/data/src/main/java/com/letta/mobile/data/model/DomainIdConverters.kt # Room @TypeConverter
      - core/domain/src/main/java/com/letta/mobile/data/repository/api # domain API interface methods
      - core/runtime/src/commonMain/kotlin/com/letta/mobile/runtime/TurnContracts.kt # sealed runtime contract variants
      - core/testutil/src/main # test doubles and helper entry points
      - designsystem/src/main/java/com/letta/mobile/ui/components/Previews.kt # @Preview composables
      - desktop/src/main/kotlin/com/letta/mobile/desktop # @Composable surfaces wired from LettaDesktopApp/Main
      - feature-chat/src/main/java/com/letta/mobile/feature/chat/subagent
      - feature-chat/src/main/java/com/letta/mobile/feature/chat/coordination/ChatUiStateProvider.kt
      - app/src/main/java/com/letta/mobile/ui/screens/agentlist/AgentListUiStateProvider.kt
      - sharedLogic/src/androidMain/kotlin/com/letta/mobile/data/timeline # KMP actual logger implementation
      - sharedLogic/src/commonMain/kotlin/com/letta/mobile/data/model/Approval.kt # serialization models
      - sharedLogic/src/commonMain/kotlin/com/letta/mobile/data/model/CronTask.kt # status constants used via serialization/API
      - sharedLogic/src/hostNativeMain/kotlin/com/letta/mobile/data/timeline # KMP actual logger implementation
      - sharedLogic/src/jvmMain/kotlin/com/letta/mobile/data/timeline # KMP actual logger implementation
      - app/src/main/java/com/letta/mobile/ui/screens/projects/ProjectHomeViewModel.kt # Hilt ViewModel constructor
      - feature-chat/src/main/java/com/letta/mobile/feature/chat/coordination/AdminChatA2uiCoordinator.kt # coordinator hooks wired from ViewModel
      - app/src/main/java/com/letta/mobile/platform/root/RootShellBridge.kt # root/IPC bridge surface
      - sharedLogic/src/jvmAndAndroid/kotlin/com/letta/mobile/ui/markdown/StreamingMarkdownParser.kt # streaming markdown helpers kept for parser evolution
      - sharedLogic/src/commonMain/kotlin/com/letta/mobile/data/channel/NotificationDelivery.kt # @Preview + delivery stream contracts
  # Adaptive icons must stay in mipmap-anydpi-v26 (API 26+). Renaming to
  # mipmap-anydpi to silence ObsoleteSdkInt breaks AAPT linking for play builds.
  - name: AndroidLintObsoleteSdkInt
    paths:
      - app/src/main/res/mipmap-anydpi-v26
  # SentryInitializer must use Resources.getIdentifier so missing optional
  # strings (DSN/env/sample-rate) soft-fail; R.string lookups throw and break
  # App Startup / unit tests when resources are absent.
  - name: AndroidLintDiscouragedApi
    paths:
      - app/src/main/java/com/letta/mobile/crash/SentryInitializer.kt
  # Baseline Profile non-shipping merge-manifest; Qodana's Android model does
  # not resolve MainActivity for this synthetic variant even with an FQCN.
  - name: AndroidDomInspection
    paths:
      - app/src/playNonMinifiedRelease/AndroidManifest.xml
  # Gradle incubating APIs (dependencyResolutionManagement / externalNativeBuild)
  # are required by current AGP/Gradle DSL; tracked via Gradle upgrades, not this gate.
  - name: UnstableApiUsage
    paths:
      - settings.gradle.kts
      - build-logic/settings.gradle.kts
      - app/build.gradle.kts
  # Local/LAN Letta backends still speak cleartext HTTP; tightening this breaks
  # on-device/dev server discovery. Documented in network_security_config.xml.
  - name: AndroidLintInsecureBaseConfiguration
    paths:
      - app/src/main/res/xml/network_security_config.xml
      - app/src/debug/res/xml/network_security_config.xml
  # Storage probes intentionally use File.usableSpace for a cheap availability
  # signal; allocateBytes is for reservation, not free-space reporting.
  - name: AndroidLintUsableSpace
    paths:
      - app/src/main/java/com/letta/mobile/runtime/local/modelcatalog/EmbeddedModelRepository.kt
      - app/src/main/java/com/letta/mobile/runtime/sensors/AndroidDeviceSensorSnapshotProvider.kt
  # Play policy warning is intentional product surface (user-driven opt-out of
  # battery optimizations for reliable background agent work).
  - name: AndroidLintBatteryLife
    paths:
      - app/src/main/java/com/letta/mobile/platform/BatteryOptimizationHelper.kt
  # Launcher/splash vectors exceed 200×200 by design for adaptive-icon fidelity.
  - name: AndroidLintVectorRaster
    paths:
      - app/src/main/res/drawable/splash_letta_icon.xml
      - app/src/main/res/drawable/ic_launcher_monochrome.xml
      - app/src/main/res/drawable/ic_launcher_foreground.xml
  # ProGuard keep rules for kotlinx.serialization / reflective models; narrowing
  # them breaks release minification. Tracked with R8/full-mode work separately.
  - name: ExpensiveKeepRuleInspection
    paths:
      - app/proguard-rules.pro
  # JCEF Compose OSR bridge must subclass package-private CefBrowser_N.
  - name: ClassEscapesItsScope
    paths:
      - desktop/src/main/java/org/cef/browser/ComposeOsrBrowser.java
  # Coroutine control-flow sentinels (not thrown to callers as API exceptions).
  - name: ObjectInheritsException
    paths:
      - sharedLogic/src/commonMain/kotlin/com/letta/mobile/data/runtime/AppServerTurnEngine.kt
  # CLI interactive record/replay and blocking HTTP helpers intentionally use
  # synchronous I/O on dedicated CLI threads; rewriting changes probe semantics.
  - name: BlockingMethodInNonBlockingContext
    paths:
      - cli/src/main/java/com/letta/mobile/cli/runtime
      - core/data/src/main/java/com/letta/mobile/data/api/AgentApi.kt
      - app/src/main/java/com/letta/mobile/runtime/local/modelcatalog/EmbeddedModelRepository.kt
