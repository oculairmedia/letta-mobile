####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################

version: "1.0"
# This is an Android/Compose Gradle build. The JVM linter imports Android
# models through an IntelliJ API that lacks AGP's PrivacySandboxSdkInfo method;
# the Android linter ships the matching Android project-model support.
linter: qodana-android
profile:
  name: qodana.recommended
include:
  - name: CheckDependencyLicenses