name: Desktop Installer

# Builds the Windows desktop client installer (EXE + MSI) for the :desktop
# Compose Multiplatform module. jpackage is OS-native, so the installer MUST be
# produced on a Windows runner — Linux runners can only build .deb/.rpm or the
# cross-platform uber-jar. See letta-mobile-nvrq8.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/desktop.yml"
      - "android-compose/desktop/**"
      - "android-compose/sharedLogic/**"
      - "android-compose/gradle/**"
      - "android-compose/settings.gradle.kts"
      - "android-compose/build.gradle.kts"
      - "android-compose/gradle.properties"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/desktop.yml"
      - "android-compose/desktop/**"
      - "android-compose/sharedLogic/**"
      - "android-compose/gradle/**"
      - "android-compose/settings.gradle.kts"
      - "android-compose/build.gradle.kts"
      - "android-compose/gradle.properties"
  workflow_dispatch:

concurrency:
  group: desktop-installer-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-installer:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: android-compose

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so build.gradle.kts can resolve
          # `git describe --tags` for the versionName fallback.
          fetch-depth: 0

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 26

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Cache Konan (Kotlin/Native) toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('android-compose/gradle/wrapper/gradle-wrapper.properties', 'android-compose/sharedLogic/build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Build Windows EXE + MSI installers
        # Produces release distributables for the host OS (Windows here):
        #   desktop/build/compose/binaries/main-release/exe/*.exe
        #   desktop/build/compose/binaries/main-release/msi/*.msi
        run: ./gradlew --no-daemon :desktop:packageReleaseDistributionForCurrentOS

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: letta-desktop-windows-installer-${{ github.run_number }}
          path: |
            android-compose/desktop/build/compose/binaries/main-release/exe/*.exe
            android-compose/desktop/build/compose/binaries/main-release/msi/*.msi
          if-no-files-found: error

  # Stable status check for branch protection.
  desktop-installer-pass:
    runs-on: ubuntu-latest
    needs: windows-installer
    if: always()
    steps:
      - name: Verify windows-installer succeeded
        run: |
          result="${{ needs.windows-installer.result }}"
          if [ "$result" != "success" ]; then
            echo "windows-installer did not succeed (result=$result)"
            exit 1
          fi
          echo "windows-installer succeeded"
