name: Release

# Tag-driven release. Push a tag like `v1.2.3` to cut a release:
#   git tag -a v1.2.3 -m "release: 1.2.3"
#   git push origin v1.2.3
#
# Builds:
#   - the signed play-release APK WITH the embedded Letta Code runtime
#     (nodejs-mobile libnode + npm assets baked in, so the app can run the
#     agent on-device with no remote shim), and
#   - the Windows desktop EXE + MSI installers.
# Creates a GitHub Release with auto-generated notes from PRs merged since the
# previous tag, and attaches the APK + EXE + MSI as release assets.
#
# Trigger by accident? Delete the tag (`git push --delete origin v1.2.3`)
# and the release before anyone downloads it.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must already exist, e.g. v1.2.3)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── Android: signed play-release APK WITH embedded runtime ──────────────
  android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-compose
    outputs:
      tag: ${{ steps.artifact.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0  # full history so release-notes auto-generation can diff against the prior tag

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 26

      - name: Setup Node 22 (embedded runtime npm asset packaging)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > app/letta-release.jks

      - name: Build signed play-release APK (embedded runtime)
        # -PembedLettaCodeNative=true bakes the nodejs-mobile libnode .so + the
        # npm-packaged Letta Code assets into the APK so the agent can run
        # on-device (local runtime), not only via the remote shim.
        # -PembedLettaCodeAssets=true is implied by Native but set explicitly.
        env:
          SIGNING_STORE_FILE: letta-release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
        run: ./gradlew :app:assemblePlayRelease -PembedLettaCodeNative=true -PembedLettaCodeAssets=true --build-cache

      - name: Remove signing keystore
        # Runner is ephemeral, but don't leave the decoded keystore on disk
        # any longer than necessary. `if: always()` so failure paths clean up too.
        if: always()
        run: rm -f app/letta-release.jks

      - name: Verify embedded runtime is present in the APK
        # Fail loudly if the embedded libnode .so didn't make it into the APK —
        # a non-embedded release APK is a silent regression of this workflow's
        # whole purpose.
        working-directory: android-compose/app/build/outputs/apk/play/release
        run: |
          set -euo pipefail
          apk=$(ls *.apk | head -n 1)
          if ! unzip -l "$apk" | grep -q 'libnode.so'; then
            echo "ERROR: libnode.so not found in $apk — embedded runtime missing from release APK"
            unzip -l "$apk" | grep -i '\.so' || true
            exit 1
          fi
          echo "OK: embedded runtime (libnode.so) present in $apk"

      - name: Rename APK with tag
        id: artifact
        working-directory: android-compose/app/build/outputs/apk/play/release
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          src=$(ls *.apk | head -n 1)
          dest="letta-mobile-${tag}-embedded.apk"
          cp -f "$src" "$dest"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android-compose/app/build/outputs/apk/play/release/letta-mobile-*-embedded.apk
          if-no-files-found: error

  # ── Desktop: Windows EXE + MSI installers ───────────────────────────────
  desktop-installers:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: android-compose

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0  # git describe --tags for versionName

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 26

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Konan (Kotlin/Native) toolchain
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('android-compose/gradle/wrapper/gradle-wrapper.properties', 'android-compose/sharedLogic/build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Build Windows EXE + MSI installers
        # Output:
        #   desktop/build/compose/binaries/main/exe/*.exe
        #   desktop/build/compose/binaries/main/msi/*.msi
        run: ./gradlew --no-daemon :desktop:packageDistributionForCurrentOS

      - name: Upload desktop installers
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installers
          path: |
            android-compose/desktop/build/compose/binaries/main/exe/*.exe
            android-compose/desktop/build/compose/binaries/main/msi/*.msi
          if-no-files-found: error

  # ── Publish: gather APK + EXE + MSI and create the release ──────────────
  publish:
    runs-on: ubuntu-latest
    needs: [android-apk, desktop-installers]
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-assets

      - name: Download desktop installers
        uses: actions/download-artifact@v4
        with:
          name: desktop-installers
          path: release-assets

      - name: List collected assets
        run: ls -la release-assets

      - name: Generate Nucleus Windows update metadata
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.android-apk.outputs.tag }}"
          version="${tag#v}"
          release_date="$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')"
          mapfile -d '' installers < <(find release-assets -type f \( -iname '*.exe' -o -iname '*.msi' \) -print0 | sort -z)
          if [ "${#installers[@]}" -eq 0 ]; then
            echo "No Windows installers found for updater metadata" >&2
            exit 1
          fi
          first_name="$(basename "${installers[0]}")"
          first_hash="$(openssl dgst -sha512 -binary "${installers[0]}" | openssl base64 -A)"
          {
            echo "version: ${version}"
            echo "files:"
            for installer in "${installers[@]}"; do
              name="$(basename "$installer")"
              hash="$(openssl dgst -sha512 -binary "$installer" | openssl base64 -A)"
              size="$(stat --printf='%s' "$installer")"
              echo "  - url: ${name}"
              echo "    sha512: ${hash}"
              echo "    size: ${size}"
            done
            echo "path: ${first_name}"
            echo "sha512: ${first_hash}"
            echo "releaseDate: '${release_date}'"
          } > release-assets/latest.yml

      - name: Create release with auto-generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.android-apk.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          # APK lands flat; EXE/MSI keep their exe/ and msi/ subdirs from the
          # desktop artifact. Match both flat and nested so all three attach.
          files: |
            release-assets/*.apk
            release-assets/exe/*.exe
            release-assets/msi/*.msi
            release-assets/latest.yml
