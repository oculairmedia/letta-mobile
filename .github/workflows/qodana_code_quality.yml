name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: # Specify your branches here
      - main # The 'main' branch
      - 'releases/*' # The release branches

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          # pull_request has a head SHA; push/workflow_dispatch do not. Falling
          # back to github.sha keeps this workflow valid on every declared trigger.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0  # a full history is required for pull request analysis
      # Scope discovery to android-compose below. Without that scope Qodana
      # also imports the vendored Overmorrow Flutter root (old Gradle/Groovy),
      # which is what produced the misleading JDK-25 classfile failure.
      # Qodana 2026.1 is required for this app's Gradle 9.4 / AGP 9.2 model.
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2026.1.3
        with:
          pr-mode: false
          # The Kotlin/Gradle application lives here. Restrict project discovery
          # so Qodana does not import unrelated vendored Gradle samples.
          args: --project-dir android-compose --config ../qodana.yaml
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1897914872 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'