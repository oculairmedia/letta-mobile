name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: # Specify your branches here
      - main # The 'main' branch
      - 'releases/*' # The release branches

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}  # to check out the actual pull request commit, not the merge commit
          fetch-depth: 0  # a full history is required for pull request analysis
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2026.1
        with:
          pr-mode: false
          results-dir: ${{ runner.temp }}/qodana/results
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1897914872 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'

      # letta-mobile: publish a SANITIZED findings inventory as an artifact so the
      # PM/automation can dedupe + partition remediation waves WITHOUT the Qodana
      # Cloud token (which stays a repo secret). The CSV carries only rule id,
      # severity, relative file path, line, and message — NO source snippets, NO
      # secrets. Runs on main pushes only (the authoritative inventory), and
      # always() so it publishes even when Qodana reports findings.
      - name: 'Build sanitized Qodana findings inventory (CSV, no secrets)'
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          set -euo pipefail
          SARIF="${{ runner.temp }}/qodana/results/qodana.sarif.json"
          OUT_DIR="${{ runner.temp }}/qodana-inventory"
          mkdir -p "$OUT_DIR"
          if [ ! -f "$SARIF" ]; then
            echo "No SARIF at $SARIF; skipping inventory."
            echo "sarif_missing=1" > "$OUT_DIR/status.txt"
            exit 0
          fi
          # Sanitized flat CSV: rule_id,level,file,line,message (message stripped
          # of commas/newlines; no code text is emitted by qodana in message).
          python3 - "$SARIF" "$OUT_DIR/qodana-findings.csv" "$OUT_DIR/qodana-summary.csv" <<'PY'
          import json, sys, csv, collections
          sarif_path, flat_path, summ_path = sys.argv[1], sys.argv[2], sys.argv[3]
          data = json.load(open(sarif_path))
          rows = []
          for run in data.get("runs", []):
              for r in run.get("results", []):
                  rule = r.get("ruleId", "?")
                  level = r.get("level", r.get("kind", "?"))
                  msg = (r.get("message", {}) or {}).get("text", "") or ""
                  msg = msg.replace("\n", " ").replace(",", ";")[:300]
                  locs = r.get("locations", []) or []
                  path = "?"; line = ""
                  if locs:
                      pl = (locs[0].get("physicalLocation", {}) or {})
                      path = (pl.get("artifactLocation", {}) or {}).get("uri", "?")
                      line = (pl.get("region", {}) or {}).get("startLine", "")
                  rows.append((rule, level, path, line, msg))
          with open(flat_path, "w", newline="") as f:
              w = csv.writer(f); w.writerow(["rule_id","level","file","line","message"])
              for r in rows: w.writerow(r)
          # Aggregated summary by rule + top-level module + severity (dedupe-friendly).
          agg = collections.Counter()
          for rule, level, path, line, msg in rows:
              parts = path.split("/")
              module = "/".join(parts[:4]) if len(parts) >= 4 else path
              agg[(rule, level, module)] += 1
          with open(summ_path, "w", newline="") as f:
              w = csv.writer(f); w.writerow(["rule_id","level","module","count"])
              for (rule, level, module), n in sorted(agg.items(), key=lambda x:-x[1]):
                  w.writerow([rule, level, module, n])
          print(f"findings={len(rows)} summary_rows={len(agg)}")
          PY
          echo "Inventory written to $OUT_DIR"
          head -20 "$OUT_DIR/qodana-summary.csv" || true

      - name: 'Upload sanitized Qodana inventory artifact'
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-artifact@v4
        with:
          name: qodana-inventory
          path: ${{ runner.temp }}/qodana-inventory
          if-no-files-found: warn
          retention-days: 14
