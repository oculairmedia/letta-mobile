name: Android Perf Gate

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/android-perf.yml"
      - "android-compose/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/android-perf.yml"
      - "android-compose/**"
  workflow_dispatch:
    inputs:
      rebaseline:
        description: "Seed/update android-compose/perf/baselines.json from this CI run"
        required: false
        default: false
        type: boolean

concurrency:
  group: android-perf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  perf-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-compose
    env:
      PERF_BENCHMARK_FILTER: >-
        com.letta.mobile.macrobenchmark.StartupBenchmark#coldStartupCompilationPartial,
        com.letta.mobile.macrobenchmark.StartupBenchmark#warmStartup,
        com.letta.mobile.macrobenchmark.ScrollJankBenchmark#scrollChatListCompilationPartial,
        com.letta.mobile.macrobenchmark.ComposerTypingBenchmark#typeComposerCompilationPartial
      PERF_OUTPUT_DIR: macrobenchmark/build/outputs/connected_android_test_additional_output
      PERF_REPORT_DIR: macrobenchmark/build/reports/androidTests
      PR_TITLE: ${{ github.event.pull_request.title || '' }}
      WORKFLOW_REBASELINE: ${{ inputs.rebaseline || false }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run macrobenchmarks on API 33 emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          cores: 4
          ram-size: 4096M
          heap-size: 512M
          emulator-boot-timeout: 900
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          working-directory: android-compose
          script: |
            ./gradlew --no-daemon :macrobenchmark:connectedBenchmarkAndroidTest \
              -Pandroid.testInstrumentationRunnerArguments.class="$PERF_BENCHMARK_FILTER"

      - name: Check perf baselines
        run: |
          set -euo pipefail
          if [[ "$WORKFLOW_REBASELINE" == "true" ]] || [[ "$PR_TITLE" == *"[perf:rebaseline]"* ]]; then
            python3 perf/check_baselines.py "$PERF_OUTPUT_DIR" --rebaseline
          else
            python3 perf/check_baselines.py "$PERF_OUTPUT_DIR"
          fi

      - name: Upload perf benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-perf-results-${{ github.run_number }}
          path: |
            android-compose/${{ env.PERF_OUTPUT_DIR }}
            android-compose/${{ env.PERF_REPORT_DIR }}
          if-no-files-found: warn

      - name: Upload rebaselined perf baselines
        if: always() && (inputs.rebaseline || contains(github.event.pull_request.title || '', '[perf:rebaseline]'))
        uses: actions/upload-artifact@v4
        with:
          name: android-perf-baselines-${{ github.run_number }}
          path: android-compose/perf/baselines.json
          if-no-files-found: error
