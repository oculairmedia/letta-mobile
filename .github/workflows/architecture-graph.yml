name: Architecture Graph (advisory)

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/architecture-graph.yml"
      - "android-compose/**/*.gradle.kts"
      - "android-compose/gradle/**"
      - "android-compose/build-logic/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/architecture-graph.yml"
      - "android-compose/**/*.gradle.kts"
      - "android-compose/gradle/**"
      - "android-compose/build-logic/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  architecture-graph:
    name: Export architecture graph
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: android-compose
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 26
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Test exporter and write authoritative graph
        run: ./gradlew :build-logic:test exportArchitectureGraph --configuration-cache
      - name: Probe dependency analysis support
        continue-on-error: true
        run: ./gradlew buildHealth -PdependencyAnalysisAdvisory=true
      - name: Upload architecture reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-architecture-graph
          if-no-files-found: warn
          path: |
            android-compose/build/reports/architecture/graph.jsonl
            android-compose/build/reports/dependency-analysis/**
