name: Android APK CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/android.yml"
      - "android-compose/**"
      - "third_party/overmorrow/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/android.yml"
      - "android-compose/**"
      - "third_party/overmorrow/**"
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Gradle's launcher JVM loads native-platform before project gradle.properties
  # can affect the daemon. CI runs on Java 26, so acknowledge this access at the
  # workflow boundary and keep project-level flags scoped to daemon/test workers.
  GRADLE_OPTS: --enable-native-access=ALL-UNNAMED

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-compose

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + tags so build.gradle.kts can resolve
          # `git describe --tags` for the versionName fallback on
          # untagged-main / PR builds. Shallow clone returns no tags,
          # which would force the build to fall back to "0.0.0-dev".
          fetch-depth: 0

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 26

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Let same-repo PRs write Gradle User Home caches so the build-apk
          # jobs can restore task outputs produced by the test job. Fork PRs
          # stay read-only to avoid untrusted Gradle User Home cache writes.
          # Project-local state is handled by the separate same-repo-only cache
          # step below.
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Cache project-local Gradle state
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/cache@v4
        with:
          # This complements setup-gradle's Gradle User Home cache with the
          # project-local state it intentionally does not persist. Fork PRs skip
          # this cache entirely so untrusted builds cannot poison incremental
          # Kotlin/KSP/AGP state used by trusted branches.
          path: |
            android-compose/.gradle
            android-compose/.kotlin
            android-compose/**/build/intermediates/ksp
            android-compose/**/build/intermediates/incremental
          key: ${{ runner.os }}-gradle-project-v1-${{ hashFiles('android-compose/gradle/wrapper/gradle-wrapper.properties', 'android-compose/settings.gradle.kts', 'android-compose/**/*.gradle.kts', 'android-compose/gradle/libs.versions.toml', 'android-compose/gradle.properties') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-gradle-project-v1-${{ hashFiles('android-compose/gradle/wrapper/gradle-wrapper.properties', 'android-compose/settings.gradle.kts', 'android-compose/**/*.gradle.kts', 'android-compose/gradle/libs.versions.toml', 'android-compose/gradle.properties') }}-

      - name: Compile all debug variants
        run: ./gradlew :core:domain:compileKotlin :core:data:compileDebugKotlin :core:testutil:compileDebugKotlin :app:compileRootDebugKotlin :app:compileSideloadDebugKotlin :app:compilePlayDebugKotlin

      - name: Run unit tests
        run: |
          ./gradlew :core:data:testDebugUnitTest :app:testRootDebugUnitTest
          ./gradlew :app:testScreenshot

  build-apk:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: root-debug
            gradle_task: :app:assembleRootDebug
            artifact_name: app-root-debug-apk
            artifact_path: android-compose/app/build/outputs/apk/root/debug/*.apk
          - variant: play-release
            gradle_task: :app:assemblePlayRelease
            artifact_name: app-play-release-apk
            artifact_path: android-compose/app/build/outputs/apk/play/release/*.apk
    defaults:
      run:
        working-directory: android-compose

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + tags so build.gradle.kts can resolve
          # `git describe --tags` for the versionName fallback on
          # untagged-main / PR builds. Shallow clone returns no tags,
          # which would force the build to fall back to "0.0.0-dev".
          fetch-depth: 0

      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 26

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Restore the Gradle User Home entry written by the test job; keep
          # fork PRs read-only and leave project-local state to the separate
          # same-repo-only cache below.
          cache-read-only: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Cache project-local Gradle state
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/cache@v4
        with:
          # Same key as the test job: build-apk can restore the project-local
          # state produced by test after the dependency edge completes.
          path: |
            android-compose/.gradle
            android-compose/.kotlin
            android-compose/**/build/intermediates/ksp
            android-compose/**/build/intermediates/incremental
          key: ${{ runner.os }}-gradle-project-v1-${{ hashFiles('android-compose/gradle/wrapper/gradle-wrapper.properties', 'android-compose/settings.gradle.kts', 'android-compose/**/*.gradle.kts', 'android-compose/gradle/libs.versions.toml', 'android-compose/gradle.properties') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-gradle-project-v1-${{ hashFiles('android-compose/gradle/wrapper/gradle-wrapper.properties', 'android-compose/settings.gradle.kts', 'android-compose/**/*.gradle.kts', 'android-compose/gradle/libs.versions.toml', 'android-compose/gradle.properties') }}-

      - name: Decode signing keystore
        if: matrix.variant == 'play-release'
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > app/letta-release.jks

      - name: Build ${{ matrix.variant }} APK
        env:
          SIGNING_STORE_FILE: ${{ matrix.variant == 'play-release' && 'letta-release.jks' || '' }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          # Self-hosted Sentry config. The Sentry Gradle plugin's upload
          # tasks (uploadSentryProguardMappingsRelease, sentryBundleSources*)
          # read these from the environment. PR builds validate that the APK
          # assembles, but they must not depend on remote Sentry uploads or on
          # a non-expired production token. Main-branch builds still receive
          # the secrets and upload mappings/source context.
          SENTRY_AUTH_TOKEN: ${{ github.event_name != 'pull_request' && secrets.SENTRY_AUTH_TOKEN || '' }}
          SENTRY_ORG: ${{ github.event_name != 'pull_request' && secrets.SENTRY_ORG || '' }}
          SENTRY_PROJECT: ${{ github.event_name != 'pull_request' && secrets.SENTRY_PROJECT || '' }}
          SENTRY_URL: ${{ github.event_name != 'pull_request' && secrets.SENTRY_URL || '' }}
        run: ./gradlew ${{ matrix.gradle_task }} --build-cache

      - name: Validate play-release APK size and R8 config
        if: matrix.variant == 'play-release'
        run: bash ../scripts/ci/validate-android-release-apk.sh

      - name: Remove signing keystore
        # Same hygiene as the release workflow -- runner is ephemeral but
        # don't leave the decoded keystore on disk longer than needed.
        if: always() && matrix.variant == 'play-release'
        run: rm -f app/letta-release.jks

      - name: Upload ${{ matrix.variant }} APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.run_number }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  # Aggregator job: reports a single stable status check that branch
  # protection can require. The `build-apk` job above runs as a matrix,
  # so each matrix entry produces its own check context whose name
  # includes all the matrix values
  # (e.g. "build-apk (root-debug, :app:assembleRootDebug, ...)").
  # GitHub branch-protection rules can't require a matrix-expanded
  # context cleanly -- the names truncate at 100 chars and change if
  # the matrix definition changes. This wrapper depends on the matrix
  # and reports as a single `build-apk-pass` context that's stable
  # against matrix edits and matches the bootstrap-branch-protection
  # script.
  build-apk-pass:
    runs-on: ubuntu-latest
    needs: build-apk
    if: always()
    steps:
      - name: Verify build-apk matrix succeeded
        run: |
          result="${{ needs.build-apk.result }}"
          if [ "$result" != "success" ]; then
            echo "build-apk matrix did not succeed (result=$result)"
            exit 1
          fi
          echo "build-apk matrix succeeded"
