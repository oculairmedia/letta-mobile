name: Android APK CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/android.yml"
      - "android-compose/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/android.yml"
      - "android-compose/**"
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-compose

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + tags so build.gradle.kts can resolve
          # `git describe --tags` for the versionName fallback on
          # untagged-main / PR builds. Shallow clone returns no tags,
          # which would force the build to fall back to "0.0.0-dev".
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile all debug variants
        run: ./gradlew :core:compileDebugKotlin :app:compileRootDebugKotlin :app:compileSideloadDebugKotlin :app:compilePlayDebugKotlin

      - name: Run unit tests
        run: ./gradlew :core:testDebugUnitTest :app:testRootDebugUnitTest

  build-apk:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: root-debug
            gradle_task: :app:assembleRootDebug
            artifact_name: app-root-debug-apk
            artifact_path: android-compose/app/build/outputs/apk/root/debug/*.apk
          - variant: play-release
            gradle_task: :app:assemblePlayRelease
            artifact_name: app-play-release-apk
            artifact_path: android-compose/app/build/outputs/apk/play/release/*.apk
    defaults:
      run:
        working-directory: android-compose

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history + tags so build.gradle.kts can resolve
          # `git describe --tags` for the versionName fallback on
          # untagged-main / PR builds. Shallow clone returns no tags,
          # which would force the build to fall back to "0.0.0-dev".
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        if: matrix.variant == 'play-release'
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > app/letta-release.jks

      - name: Build ${{ matrix.variant }} APK
        env:
          SIGNING_STORE_FILE: ${{ matrix.variant == 'play-release' && 'letta-release.jks' || '' }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          # Self-hosted Sentry config. The Sentry Gradle plugin's upload
          # tasks (uploadSentryProguardMappingsRelease, sentryBundleSources*)
          # read these from the environment. PR builds validate that the APK
          # assembles, but they must not depend on remote Sentry uploads or on
          # a non-expired production token. Main-branch builds still receive
          # the secrets and upload mappings/source context.
          SENTRY_AUTH_TOKEN: ${{ github.event_name != 'pull_request' && secrets.SENTRY_AUTH_TOKEN || '' }}
          SENTRY_ORG: ${{ github.event_name != 'pull_request' && secrets.SENTRY_ORG || '' }}
          SENTRY_PROJECT: ${{ github.event_name != 'pull_request' && secrets.SENTRY_PROJECT || '' }}
          SENTRY_URL: ${{ github.event_name != 'pull_request' && secrets.SENTRY_URL || '' }}
        run: ./gradlew ${{ matrix.gradle_task }} --build-cache

      - name: Remove signing keystore
        # Same hygiene as the release workflow -- runner is ephemeral but
        # don't leave the decoded keystore on disk longer than needed.
        if: always() && matrix.variant == 'play-release'
        run: rm -f app/letta-release.jks

      - name: Upload ${{ matrix.variant }} APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.run_number }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  # Aggregator job: reports a single stable status check that branch
  # protection can require. The `build-apk` job above runs as a matrix,
  # so each matrix entry produces its own check context whose name
  # includes all the matrix values
  # (e.g. "build-apk (root-debug, :app:assembleRootDebug, ...)").
  # GitHub branch-protection rules can't require a matrix-expanded
  # context cleanly -- the names truncate at 100 chars and change if
  # the matrix definition changes. This wrapper depends on the matrix
  # and reports as a single `build-apk-pass` context that's stable
  # against matrix edits and matches the bootstrap-branch-protection
  # script.
  build-apk-pass:
    runs-on: ubuntu-latest
    needs: build-apk
    if: always()
    steps:
      - name: Verify build-apk matrix succeeded
        run: |
          result="${{ needs.build-apk.result }}"
          if [ "$result" != "success" ]; then
            echo "build-apk matrix did not succeed (result=$result)"
            exit 1
          fi
          echo "build-apk matrix succeeded"
