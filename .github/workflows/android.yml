name: Android APK CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/android.yml"
      - "android-compose/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/android.yml"
      - "android-compose/**"
  workflow_dispatch:

concurrency:
  group: android-apk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-compose

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile app and run unit tests
        run: ./gradlew :app:compileDebugKotlin :core:testDebugUnitTest :app:testDebugUnitTest --no-daemon --build-cache

  build-apk:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: debug
            gradle_task: :app:assembleDebug
            artifact_name: app-debug-apk
            artifact_path: android-compose/app/build/outputs/apk/debug/*.apk
          - variant: release
            gradle_task: :app:assembleRelease
            artifact_name: app-release-apk
            artifact_path: android-compose/app/build/outputs/apk/release/*.apk
    defaults:
      run:
        working-directory: android-compose

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        if: matrix.variant == 'release'
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > android-compose/app/letta-release.jks

      - name: Build ${{ matrix.variant }} APK
        env:
          SIGNING_STORE_FILE: ${{ matrix.variant == 'release' && 'letta-release.jks' || '' }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew ${{ matrix.gradle_task }} --no-daemon --build-cache

      - name: Upload ${{ matrix.variant }} APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.run_number }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
