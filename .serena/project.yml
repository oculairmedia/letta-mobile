project_name: "letta-mobile"
languages:
  - kotlin
  - java
  - bash
  - json
  - yaml
encoding: "utf-8"
language_backend: LSP
ignore_all_files_in_gitignore: true
ls_workspace_folders:
  - "android-compose"
ignored_paths:
  - "third_party/**"
  - "android-compose/app/**"
  - "android-compose/designsystem/**"
  - "android-compose/feature-*/**"
  - "android-compose/.gradle/**"
  - "android-compose/**/build/**"
  - ".local/**"
read_only: false
excluded_tools: []
included_optional_tools: []
initial_prompt: "Use Serena for symbol-level navigation in the JVM and shared Kotlin modules. Treat generated SCIP data as advisory only."
symbol_info_budget: 10
